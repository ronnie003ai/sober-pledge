<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:40px;">
<h2>Right-click each icon and "Save Image As"</h2>
<p>Save as <strong>icon-192.png</strong> and <strong>icon-512.png</strong></p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512" style="margin-left:20px;"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;

    // Background
    ctx.fillStyle = '#0a0f1a';
    ctx.fillRect(0, 0, s, s);

    // Circle
    const cx = s / 2, cy = s * 0.42, r = s * 0.25;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#6366f1';
    ctx.fill();

    // Handshake emoji as text
    ctx.font = `${s * 0.28}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🤝', cx, cy);

    // App name
    ctx.fillStyle = '#e2e8f0';
    ctx.font = `bold ${s * 0.09}px -apple-system, sans-serif`;
    ctx.fillText('SOBER', cx, cy + r + s * 0.1);
    ctx.fillText('PLEDGE', cx, cy + r + s * 0.2);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
